<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandate Management System | Final Build 2026</title>
<style>
    /* --- Professional Banking UI --- */
    *{margin:0;padding:0;box-sizing:border-box;}
    
    body {
        /* Dashboard Background Image */
        background: linear-gradient(rgba(15, 23, 42, 0.5), rgba(15, 23, 42, 0.5)), 
                    url('BACK.jpg') no-repeat center center fixed; 
        background-size: cover;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        color: #e2e8f0; 
        line-height: 1.5;
    }

    header {
        background: rgba(2, 6, 23, 0.85); 
        backdrop-filter: blur(10px);
        padding: 15px 30px; 
        border-bottom: 2px solid #3b82f6; 
        display: none; 
        justify-content: space-between; 
        align-items: center;
    }

    .container { padding: 25px; max-width: 1400px; margin: auto; display: none; } 
    
    /* Login Screen Background Image */
    .overlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: url('BACK.jpg') no-repeat center center fixed;
        background-size: cover;
        display: flex; justify-content: center; align-items: center; z-index: 9999; 
    }

    .modal-card, .card { 
        background: rgba(30, 41, 59, 0.8); 
        backdrop-filter: blur(12px);
        padding: 35px; border-radius: 12px; width: 100%; max-width: 420px; 
        border: 1px solid rgba(59, 130, 246, 0.3); text-align: center; 
    }

    .card { max-width: 100%; text-align: left; padding: 20px; margin-bottom: 20px; }
    
    .std-input { width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.8); border: 1px solid #334155; color: white; border-radius: 6px; margin-bottom: 15px; outline: none;}
    .std-input:focus { border-color: #3b82f6; }
    
    .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
    .btn-block { width: 100%; margin-bottom: 10px; }
    .btn-primary { background: #3b82f6; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-success { background: #22c55e; color: white; }
    .btn-warn { background: #f59e0b; color: #020617; }

    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    .stat { padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; font-size: 14px; color: white; }
    
    .controls-row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
    input, select { background: rgba(15, 23, 42, 0.7); color: white; padding: 10px; border-radius: 6px; border: 1px solid #475569; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: rgba(2, 6, 23, 0.8); padding: 15px; text-align: left; color: #3b82f6; font-size: 11px; text-transform: uppercase; }
    td { padding: 12px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-size: 14px; }
    tr:hover { background: rgba(59, 130, 246, 0.1); }
    
    .history-box { height:180px; overflow-y:auto; background: rgba(0,0,0,0.3); padding: 12px; border-radius: 6px; font-family: monospace; font-size: 12px; border: 1px solid #334155;}
</style>
</head>
<body>

<div id="loginOverlay" class="overlay">
    <div class="modal-card">
        <h2 style="color:#3b82f6; margin-bottom:10px;">Bank Portal</h2>
        <p style="margin-bottom:20px; font-size:14px; color:#94a3b8;">Portal Login: PF240937</p>
        <input type="text" id="username" class="std-input" placeholder="Username">
        <input type="password" id="password" class="std-input" placeholder="Password">
        <button class="btn btn-block btn-primary" onclick="checkLogin()">Sign In</button>
        <p id="loginErr" style="color:#ef4444; display:none; margin-top:10px; font-size:13px;">Invalid Credentials</p>
    </div>
</div>

<header id="appHeader">
    <span style="font-weight: bold; color: #3b82f6;">MANDATE MANAGER</span>
    <div>
        <button class="btn btn-warn" onclick="printSummary()">Print Summary</button>
        <button class="btn btn-danger" style="margin-left:10px;" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container" id="mainApp">
    <div class="card grid">
        <div class="stat" style="background:rgba(59, 130, 246, 0.7)">Total: <span id="stat-total">0</span></div>
        <div class="stat" style="background:rgba(34, 197, 94, 0.7)">Vault: <span id="stat-vault">0</span></div>
    </div>

    <div class="card">
        <div class="controls-row" style="margin-bottom:20px;">
            <input id="accIn" placeholder="Account No">
            <input id="nameIn" placeholder="Full Name">
            <input id="fileIn" placeholder="File Ref" style="width:120px;">
            <button class="btn btn-success" onclick="addMandate()">Add Record</button>
        </div>
        
        <div style="border-top: 1px solid #334155; padding-top: 15px; font-size: 13px;">
            <strong>Bulk Import:</strong> 
            <input type="file" id="csvFile" accept=".csv" onchange="importCSV(event)" style="border:none; background:transparent;">
        </div>
    </div>

    <div class="card">
        <h4 style="margin-bottom:15px; color:#3b82f6;">ACTIVE RECORDS</h4>
        <table>
            <thead>
                <tr><th>Account</th><th>Name</th><th>File Ref</th><th>Action</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="card">
        <h4 style="margin-bottom:10px; font-size:13px; color:#94a3b8;">System Audit Log</h4>
        <div id="logBox" class="history-box"></div>
    </div>
</div>

<script>
const KEY = "PF240937";
let mandates = JSON.parse(localStorage.getItem("m_active")) || [];
let logs = JSON.parse(localStorage.getItem("m_logs")) || [];

function checkLogin() {
    if(document.getElementById("username").value === KEY && document.getElementById("password").value === KEY) {
        sessionStorage.setItem("auth", "ok");
        start();
    } else {
        document.getElementById("loginErr").style.display = "block";
    }
}

function start() {
    document.getElementById("loginOverlay").style.display = "none";
    document.getElementById("mainApp").style.display = "block";
    document.getElementById("appHeader").style.display = "flex";
    refresh();
}

function refresh() {
    const body = document.getElementById("tableBody");
    body.innerHTML = mandates.map(m => `
        <tr>
            <td>${m.account}</td><td>${m.name}</td><td>${m.file}</td>
            <td><button class="btn btn-danger" style="padding:4px 8px; font-size:10px;" onclick="del('${m.account}')">DEL</button></td>
        </tr>
    `).join("");
    document.getElementById("stat-total").innerText = mandates.length;
    document.getElementById("logBox").innerHTML = logs.map(l => `<div>${l}</div>`).join("");
    localStorage.setItem("m_active", JSON.stringify(mandates));
    localStorage.setItem("m_logs", JSON.stringify(logs));
}

function addMandate() {
    const acc = document.getElementById("accIn").value.trim();
    const name = document.getElementById("nameIn").value.trim();
    const file = document.getElementById("fileIn").value.trim();
    if(!acc || !name) return alert("Fill Name and Account");
    mandates.push({account:acc, name:name, file:file || "N/A"});
    logs.unshift(`[${new Date().toLocaleTimeString()}] ADDED: ${acc}`);
    refresh();
    document.getElementById("accIn").value = "";
    document.getElementById("nameIn").value = "";
}

function importCSV(e) {
    const reader = new FileReader();
    reader.onload = (f) => {
        const rows = f.target.result.split(/\r?\n/).slice(1);
        rows.forEach(r => {
            const c = r.split(",").map(v => v.trim());
            if(c[0] && !mandates.some(x=>x.account===c[0])) {
                mandates.push({ account:c[0], name:c[1]||"N/A", file:c[2]||"N/A" });
            }
        });
        logs.unshift(`[${new Date().toLocaleTimeString()}] CSV IMPORT SUCCESS`);
        refresh();
    };
    reader.readAsText(e.target.files[0]);
}

function del(acc) {
    if(confirm("Confirm deletion of " + acc + "?")) {
        mandates = mandates.filter(m => m.account !== acc);
        logs.unshift(`[${new Date().toLocaleTimeString()}] DELETED: ${acc}`);
        refresh();
    }
}

function logout() { sessionStorage.clear(); location.reload(); }
function printSummary() { window.print(); }
window.onload = () => { if(sessionStorage.getItem("auth")) start(); };
</script>
</body>
</html>
