<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandate Management System | Bank of Ceylon</title>
<style>
    /* --- THEMED BACKGROUND SETTINGS --- */
    body {
        margin: 0;
        padding: 0;
        background: #020617 url('image_0.png') no-repeat center center fixed; 
        background-size: cover;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: #e2e8f0;
    }

    /* --- GLASS-MORPHISM CARDS --- */
    .card {
        background: rgba(30, 41, 59, 0.75); /* Transparent background */
        backdrop-filter: blur(8px); /* Blur effect to show image texture */
        -webkit-backdrop-filter: blur(8px);
        padding: 20px;
        border-radius: 12px;
        margin-bottom: 20px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* --- LOGIN UI --- */
    .overlay { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: rgba(2, 6, 23, 0.4); /* Slight dimming of the image */
        display: flex; justify-content: center; align-items: center; z-index: 9999; 
    }
    
    .login-card { 
        background: rgba(15, 23, 42, 0.9);
        padding: 40px; 
        border-radius: 16px; 
        width: 100%; 
        max-width: 380px; 
        border: 1px solid #3b82f6; 
        text-align: center;
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
    }

    header {
        background: rgba(2, 6, 23, 0.8);
        backdrop-filter: blur(10px);
        padding: 15px 30px; 
        border-bottom: 2px solid #3b82f6; 
        display: none; 
        justify-content: space-between; 
        align-items: center;
    }

    /* --- BUTTONS & INPUTS --- */
    .std-input { 
        width: 100%; padding: 12px; background: rgba(2, 6, 23, 0.6); 
        border: 1px solid #334155; color: white; border-radius: 8px; 
        margin-bottom: 15px; outline: none;
    }
    
    .btn { padding: 10px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
    .btn-primary { background: #3b82f6; color: white; width: 100%; }
    .btn-success { background: #22c55e; color: white; }
    .btn-danger { background: #ef4444; color: white; }
    .btn-warn { background: #f59e0b; color: #020617; }

    /* --- TABLE STYLES --- */
    .container { padding: 30px; max-width: 1300px; margin: auto; display: none; }
    table { width: 100%; border-collapse: collapse; }
    th { background: rgba(2, 6, 23, 0.8); padding: 15px; text-align: left; color: #3b82f6; font-size: 12px; text-transform: uppercase; }
    td { padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-size: 14px; }
    
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    .stat { padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; }
    .history { height: 150px; overflow-y: auto; background: rgba(0, 0, 0, 0.3); padding: 10px; border-radius: 8px; font-family: monospace; font-size: 12px; }
</style>
</head>
<body>

<div id="loginOverlay" class="overlay">
    <div class="login-card">
        <h2 style="color:#3b82f6; margin-bottom:10px;">Bank of Ceylon</h2>
        <p style="color:#94a3b8; font-size:14px; margin-bottom:20px;">Mandate Portal | PF240937</p>
        <input type="text" id="username" class="std-input" placeholder="Username">
        <input type="password" id="password" class="std-input" placeholder="Password">
        <button class="btn btn-primary" onclick="checkLogin()">Login to System</button>
        <p id="loginErr" style="color:#ef4444; display:none; margin-top:10px;">Access Denied</p>
    </div>
</div>

<header id="appHeader">
    <span style="font-weight:bold; letter-spacing:1px;">MANDATE MANAGER</span>
    <div>
        <button class="btn btn-warn" style="font-size:12px;" onclick="printSummary()">Print Summary</button>
        <button class="btn btn-danger" style="margin-left:10px; font-size:12px;" onclick="logout()">Logout</button>
    </div>
</header>

<div class="container" id="mainApp">
    <div class="grid card">
        <div class="stat" style="background: rgba(59, 130, 246, 0.6);">Total: <span id="stat-total">0</span></div>
        <div class="stat" style="background: rgba(34, 197, 94, 0.6);">Savings: <span id="stat-sav">0</span></div>
        <div class="stat" style="background: rgba(245, 158, 11, 0.6);">Current: <span id="stat-cur">0</span></div>
        <div class="stat" style="background: rgba(168, 85, 247, 0.6);">Vault: <span id="stat-vault">0</span></div>
    </div>

    <div class="card">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
            <input id="accIn" class="std-input" style="margin:0" placeholder="Acc No">
            <input id="nameIn" class="std-input" style="margin:0" placeholder="Full Name">
            <input id="fileIn" class="std-input" style="margin:0; width:120px;" placeholder="File Ref">
            <button class="btn btn-success" onclick="addMandate()">Add Entry</button>
        </div>
        <table>
            <thead>
                <tr><th>Account</th><th>Name</th><th>File</th><th>Action</th></tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <div class="card">
        <h4 style="margin-bottom:10px; font-size:13px; color:#3b82f6;">Activity Audit Log</h4>
        <div id="logBox" class="history"></div>
    </div>
</div>

<script>
const KEY = "PF240937";
let mandates = JSON.parse(localStorage.getItem("m_active")) || [];
let logs = JSON.parse(localStorage.getItem("m_logs")) || [];

function checkLogin() {
    if(document.getElementById("username").value === KEY && document.getElementById("password").value === KEY) {
        sessionStorage.setItem("auth", "ok");
        document.getElementById("loginOverlay").style.display = "none";
        document.getElementById("mainApp").style.display = "block";
        document.getElementById("appHeader").style.display = "flex";
        refresh();
    } else {
        document.getElementById("loginErr").style.display = "block";
    }
}

function refresh() {
    const body = document.getElementById("tableBody");
    body.innerHTML = mandates.map(m => `
        <tr>
            <td>${m.account}</td><td>${m.name}</td><td>${m.file}</td>
            <td><button class="btn btn-danger" style="padding:4px 8px; font-size:10px;" onclick="del('${m.account}')">DELETE</button></td>
        </tr>
    `).join("");
    
    document.getElementById("stat-total").innerText = mandates.length;
    document.getElementById("logBox").innerHTML = logs.map(l => `<div>${l}</div>`).join("");
    
    localStorage.setItem("m_active", JSON.stringify(mandates));
    localStorage.setItem("m_logs", JSON.stringify(logs));
}

function addMandate() {
    const acc = document.getElementById("accIn").value;
    const name = document.getElementById("nameIn").value;
    const file = document.getElementById("fileIn").value;
    if(!acc || !name) return;
    mandates.push({account:acc, name:name, file:file});
    logs.unshift(`[${new Date().toLocaleTimeString()}] Added: ${acc}`);
    refresh();
}

function del(acc) {
    const pw = prompt("Enter Admin Password to DELETE:");
    if(pw === KEY) {
        mandates = mandates.filter(m => m.account !== acc);
        logs.unshift(`[${new Date().toLocaleTimeString()}] DELETED: ${acc}`);
        refresh();
    }
}

function logout() { sessionStorage.clear(); location.reload(); }

window.onload = () => { if(sessionStorage.getItem("auth")) checkLogin(); };
</script>
</body>
</html>
